<body>
    <h1>Mamo's Pancakes</h1>
    <img src="../images/pancake.jpg" alt="Pancakes" height="600" width="900">
    <h2>Fluffy pancakes that melt in your mouth</h2>
    <h3>Ingredients</h3>
    <ul>
        <li>Flour</li>
        <li>Eggs</li>
        <li>Milk</li>
        <li>Butter</li>
    </ul>
    <h4>Steps</h4>
    <ol>
        <li>Melt butter in a pan.</li>
        <li>Whisk together eggs, flour and milk.</li>
        <li>Fry mixture in pan until golden brown.</li>
        <li>Serve with your favourite toppings.</li>
    </ol>
