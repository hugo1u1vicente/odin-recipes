<body>
    <h1>World Famous Scrambled Eggs</h1>
    <img src="../images/eggs.jpg" alt="Scrambled eggs" height="675" width="900">
    <h2>Creamy delicious scrambled eggs</h2>
    <h3>Ingredients</h3>
    <ul>
        <li>Eggs</li>
        <li>Cream</li>
        <li>Butter</li>
    </ul>
    <h4>Steps</h4>
    <ol>
        <li>Melt butter in a pan.</li>
        <li>Crack two eggs in a bowl, add cream, and whisk.</li>
        <li>Put eggs in pan and stir continuously.</li>
        <li>Cook until desired consistency is achieved</li>
    </ol>
